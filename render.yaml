services:
  - type: web
    name: prashik-cv-generator
    runtime: docker
    repo: https://github.com/prashdev/Gen-CV
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile.deploy
    envVars:
      - key: CLAUDE_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: KEEPALIVE_ENABLED
        value: true
      - key: KEEPALIVE_URL
        value: https://prashik-cv-generator.onrender.com
      - key: GOOGLE_SHEETS_WEBHOOK
        sync: false
    healthCheckPath: /
